<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Inter', sans-serif;
  }
  .loader {
    border: 2px solid rgba(255,255,255,0.3);
    border-top: 2px solid #ffffff;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    animation: spin 1s linear infinite;
  }
  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  ::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }
  ::-webkit-scrollbar-track {
    background: #f1f1f1; 
  }
  ::-webkit-scrollbar-thumb {
    background: #cbd5e1; 
    border-radius: 4px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: #94a3b8; 
  }
  input, select, textarea {
    color: #1f2937;
    -webkit-text-fill-color: #1f2937;
  }
  input:-webkit-autofill,
  input:-webkit-autofill:hover, 
  input:-webkit-autofill:focus, 
  input:-webkit-autofill:active {
    -webkit-box-shadow: 0 0 0 30px #f9fafb inset !important;
    -webkit-text-fill-color: #1f2937 !important;
    transition: background-color 5000s ease-in-out 0s;
  }
  select {
    background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
    background-position: right 0.5rem center;
    background-repeat: no-repeat;
    background-size: 1.5em 1.5em;
    padding-right: 2.5rem;
    -webkit-appearance: none;
    -moz-appearance: none;
    appearance: none;
  }
  #calendar-container {
    min-height: 600px;
  }
  #my-cal-inline-30min {
    width: 100%;
    height: 600px;
  }
  @media (max-width: 639px) {
    #calendar-container { min-height: unset; }
    #my-cal-inline-30min { height: calc(100svh - 80px); min-height: 400px; }
  }
  .form-container {
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .form-container.hidden {
    opacity: 0;
    transform: translateY(-10px);
    pointer-events: none;
  }
  .calendar-container {
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .calendar-container.hidden {
    display: none;
    opacity: 0;
    transform: translateY(10px);
  }
  .calendar-container:not(.hidden) {
    opacity: 1;
    transform: translateY(0);
    animation: slideIn 0.4s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react/": "https://esm.sh/react@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
  }
}
</script>

<div class="bg-[#f8fafc] min-h-screen flex items-center justify-center p-4">

  <div id="form-container" class="form-container bg-white rounded-2xl shadow-xl p-8 md:p-10 w-full max-w-xl border border-gray-100">
    <div class="mb-6">
      <h2 class="text-2xl font-bold text-gray-900">Book a Consultation</h2>
      <p class="text-gray-500 mt-1">Fill in your details to schedule a 30-minute session</p>
    </div>
    
    <form id="consultation-form" class="space-y-5" novalidate>
      <div class="space-y-1.5">
        <label class="block text-sm font-semibold text-gray-700">Full Name <span class="text-red-500">*</span></label>
        <input type="text" name="name" required placeholder="John Doe" 
          class="w-full px-4 py-3 rounded-lg border border-gray-300 placeholder-gray-300 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none transition-all bg-gray-50 focus:bg-white hover:border-gray-400">
        <p class="text-red-500 text-xs hidden" id="error-name">Please enter your full name</p>
      </div>

      <div class="space-y-1.5">
        <label class="block text-sm font-semibold text-gray-700">Email Address <span class="text-red-500">*</span></label>
        <input type="email" name="email" required placeholder="john@example.com"
          class="w-full px-4 py-3 rounded-lg border border-gray-300 placeholder-gray-300 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none transition-all bg-gray-50 focus:bg-white hover:border-gray-400"
          pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$">
        <p class="text-red-500 text-xs hidden" id="error-email">Please enter a valid email address</p>
      </div>

      <div class="space-y-1.5">
        <label class="block text-sm font-semibold text-gray-700">Phone Number <span class="text-red-500">*</span></label>
        <div class="flex gap-3">
          <select name="countryCode" class="px-3 py-3 rounded-lg border border-gray-300 bg-gray-50 focus:bg-white focus:border-blue-500 outline-none w-[110px] cursor-pointer hover:border-gray-400 transition-colors text-sm">
            <option value="+91">🇮🇳 +91</option>
            <option value="+1">🇺🇸 +1</option>
            <option value="+44">🇬🇧 +44</option>
            <option value="+971">🇦🇪 +971</option>
            <option value="+61">🇦🇺 +61</option>
            <option value="+65">🇸🇬 +65</option>
            <option value="+49">🇩🇪 +49</option>
          </select>
          <input type="tel" name="phone" required placeholder="9876543210" pattern="[0-9]{7,15}"
            class="flex-1 px-4 py-3 rounded-lg border border-gray-300 placeholder-gray-300 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none transition-all bg-gray-50 focus:bg-white hover:border-gray-400">
        </div>
        <p class="text-red-500 text-xs hidden" id="error-phone">Please enter a valid phone number (7-15 digits)</p>
      </div>

      <div class="space-y-1.5">
        <label class="block text-sm font-semibold text-gray-700">What best describes you? <span class="text-red-500">*</span></label>
        <select name="profession" required 
          class="w-full px-4 py-3 rounded-lg border border-gray-300 bg-gray-50 focus:bg-white focus:border-blue-500 outline-none cursor-pointer hover:border-gray-400 transition-colors">
          <option value="" disabled selected>Select your profession</option>
          <option value="Self Employed">Self Employed</option>
          <option value="Working Professional">Working Professional</option>
          <option value="Entrepreneur">Entrepreneur</option>
          <option value="Career Break">Career Break (currently)</option>
          <option value="Home Maker">Home Maker</option>
          <option value="Student">Student</option>
          <option value="Other">Other</option>
        </select>
        <p class="text-red-500 text-xs hidden" id="error-profession">Please select your profession</p>
      </div>

      <button type="submit" id="submit-btn" class="w-full py-4 px-6 rounded-lg text-white text-lg font-semibold bg-[#ea3879] hover:bg-[#d02668] active:bg-[#b01d56] shadow-lg hover:shadow-xl transition-all duration-200 transform hover:-translate-y-0.5 active:translate-y-0 flex items-center justify-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed disabled:transform-none">
        <span>Continue</span>
        <div id="btn-loader" class="loader hidden"></div>
      </button>
    </form>
  </div>

  <div id="calendar-container" class="calendar-container hidden w-full max-w-4xl bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
    <div class="p-6 border-b border-gray-100 bg-gray-50/50">
      <h3 class="text-xl font-bold text-gray-900">Select a Time Slot</h3>
      <p class="text-gray-500 text-sm mt-1">Choose your preferred date and time for the consultation</p>
    </div>
    <div id="my-cal-inline-30min" class="w-full h-[600px]"></div>
  </div>

</div>

<script>
  const WEBHOOK_URL = '/api/submit';

  function getISTTimestamp() {
    const now = new Date();
    const istDate = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Kolkata' }));
    
    const day = String(istDate.getDate()).padStart(2, '0');
    const month = String(istDate.getMonth() + 1).padStart(2, '0');
    const year = istDate.getFullYear();
    
    let hours = istDate.getHours();
    const minutes = String(istDate.getMinutes()).padStart(2, '0');
    const seconds = String(istDate.getSeconds()).padStart(2, '0');
    
    const ampm = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12;
    hours = hours ? hours : 12;
    const hoursStr = String(hours).padStart(2, '0');
    
    return `${day}/${month}/${year} ${hoursStr}:${minutes}:${seconds} ${ampm}`;
  }

  const trackingData = {
    ip: '',
    userAgent: navigator.userAgent,
    utm_source: '',
    utm_medium: '',
    utm_campaign: '',
    utm_term: '',
    utm_content: ''
  };

  fetch('https://api64.ipify.org?format=json')
    .then(res => res.json())
    .then(data => trackingData.ip = data.ip)
    .catch(err => console.log('IP Fetch Error:', err));

  const urlParams = new URLSearchParams(window.location.search);
  ['utm_source', 'utm_medium', 'utm_campaign', 'utm_term', 'utm_content'].forEach(param => {
    trackingData[param] = urlParams.get(param) || '';
  });

  // ── Form persistence (localStorage + URL params) ─────────────
  const _LS_KEY = 'bsc_booking_v1';
  function _saveForm() {
    try {
      const data = Object.fromEntries(new FormData(document.getElementById('consultation-form')).entries());
      localStorage.setItem(_LS_KEY, JSON.stringify(data));
    } catch(e) {}
  }
  function _restoreForm() {
    const p = new URLSearchParams(window.location.search);
    let saved = {};
    try { saved = JSON.parse(localStorage.getItem(_LS_KEY) || '{}'); } catch(e) {}
    const prefill = {
      name:        p.get('name')  || saved.name        || '',
      email:       p.get('email') || saved.email       || '',
      phone:       p.get('phone') || saved.phone       || '',
      countryCode: saved.countryCode || '',
      profession:  saved.profession  || ''
    };
    Object.entries(prefill).forEach(([name, val]) => {
      if (!val) return;
      const el = document.querySelector(`[name="${name}"]`);
      if (el) el.value = val;
    });
  }
  _restoreForm();
  window.addEventListener('storage', function(e) {
    if (e.key === _LS_KEY) _restoreForm();
  });

  const form = document.getElementById('consultation-form');
  const inputs = form.querySelectorAll('input, select');

  function validateField(field) {
    const errorEl = document.getElementById(`error-${field.name}`);
    let isValid = field.checkValidity();
    
    if (field.name === 'phone') {
      const phoneRegex = /^[0-9]{7,15}$/;
      isValid = phoneRegex.test(field.value);
    }
    
    if (errorEl) {
      if (!isValid && field.value) {
        errorEl.classList.remove('hidden');
        field.classList.add('border-red-500', 'focus:border-red-500', 'focus:ring-red-500/10');
        field.classList.remove('border-gray-300', 'focus:border-blue-500', 'focus:ring-blue-500/10');
      } else {
        errorEl.classList.add('hidden');
        field.classList.remove('border-red-500', 'focus:border-red-500', 'focus:ring-red-500/10');
        field.classList.add('border-gray-300', 'focus:border-blue-500', 'focus:ring-blue-500/10');
      }
    }
    return isValid;
  }

  inputs.forEach(input => {
    input.addEventListener('blur', () => validateField(input));
    input.addEventListener('input', () => {
      _saveForm();
      const errorEl = document.getElementById(`error-${input.name}`);
      if (errorEl && !errorEl.classList.contains('hidden')) {
        validateField(input);
      }
    });
  });
  form.addEventListener('change', _saveForm);

  const submitBtn = document.getElementById('submit-btn');
  const btnLoader = document.getElementById('btn-loader');
  const btnText = submitBtn.querySelector('span');

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    _saveForm();
    let isFormValid = true;
    inputs.forEach(input => {
      if (!validateField(input)) isFormValid = false;
    });
    
    if (!isFormValid) {
      const firstInvalid = form.querySelector('.border-red-500');
      if (firstInvalid) firstInvalid.focus();
      return;
    }

    submitBtn.disabled = true;
    btnLoader.classList.remove('hidden');
    btnText.textContent = 'Processing...';

    const formData = new FormData(form);
    const data = Object.fromEntries(formData.entries());
    
    const fullPayload = {
      ...data,
      fullPhone: `${data.countryCode} ${data.phone}`,
      tracking: trackingData,
      submittedAt: getISTTimestamp(),
      source: window.location.href
    };

    try {
      const response = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(fullPayload)
      });

      if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

      document.getElementById('form-container').classList.add('hidden');
      const calendarContainer = document.getElementById('calendar-container');
      calendarContainer.classList.remove('hidden');
      
      calendarContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });

    } catch (error) {
      console.error('Submission Error:', error);
      alert('Something went wrong. Please try again.');
      
      submitBtn.disabled = false;
      btnLoader.classList.add('hidden');
      btnText.textContent = 'Continue';
    }
  });

  (function (C, A, L) { 
    let p = function (a, ar) { a.q.push(ar); }; 
    let d = C.document; 
    C.Cal = C.Cal || function () { 
      let cal = C.Cal; 
      let ar = arguments; 
      if (!cal.loaded) { 
        cal.ns = {}; 
        cal.q = cal.q || []; 
        d.head.appendChild(d.createElement("script")).src = A; 
        cal.loaded = true; 
      } 
      if (ar[0] === L) { 
        const api = function () { p(api, arguments); }; 
        const namespace = ar[1]; 
        api.q = api.q || []; 
        if(typeof namespace === "string"){
          cal.ns[namespace] = cal.ns[namespace] || api;
          p(cal.ns[namespace], ar);
          p(cal, ["initNamespace", namespace]);
        } else p(cal, ar); 
        return;
      } 
      p(cal, ar); 
    }; 
  })(window, "https://app.cal.com/embed/embed.js", "init");

  Cal("init", "30min", {origin:"https://cal.com"});

  Cal.ns["30min"]("inline", {
    elementOrSelector: "#my-cal-inline-30min",
    config: {"layout":"month_view","theme":"light"},
    calLink: "bond-style-club/30min",
  });

  Cal.ns["30min"]("ui", {"theme":"light","hideEventTypeDetails":false,"layout":"month_view"});
</script>
