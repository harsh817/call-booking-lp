<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BondStyle Coaching Landing Page - Warm Mentorship</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style type="text/tailwindcss">
        :root {
            --primary-terracotta: #E07A5F;
            --primary-hover: #D0694E;
            --secondary-navy: #3D405B;
            --bg-cream: #F4F1DE;
            --bg-white: #FFFFFF;
            --text-dark: #2B2D42;
            --text-muted: #6B705C;
            --cta-orange: #FF5A00;
            --cta-hover: #E65100;
        }
    </style>
<script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        terracotta: 'var(--primary-terracotta)',
                        terracottaDark: 'var(--primary-hover)',
                        navy: 'var(--secondary-navy)',
                        cream: 'var(--bg-cream)',
                        ink: 'var(--text-dark)',
                        mutedText: 'var(--text-muted)',
                        ctaOrange: 'var(--cta-orange)',
                        ctaHover: 'var(--cta-hover)'
                    },
                    fontFamily: {
                        heading: ["'Nunito'", "sans-serif"],
                        body: ["'Inter'", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "1rem",
                        lg: "1.5rem",
                        xl: "2rem",
                        '2xl': "2.5rem"
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(61, 64, 91, 0.1)',
                        'card': '0 4px 20px rgba(0,0,0,0.05)',
                        'cta': '0 8px 30px rgba(255, 90, 0, 0.4)'
                    }
                },
            },
        };
    </script>
<style>
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-cream); color: var(--text-dark); }
        h1, h2, h3, h4, h5, h6, .font-heading { font-family: 'Nunito', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .bg-pattern {
            background-image: radial-gradient(var(--secondary-navy) 0.5px, transparent 0.5px);
            background-size: 16px 16px;
            opacity: 0.05;
        }
    </style>
</head>
